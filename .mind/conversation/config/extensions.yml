# ═══════════════════════════════════════════════════════════════
# Conversation Analysis — Extensions Configuration
# ═══════════════════════════════════════════════════════════════
# Runtime: Yes
# Part of: conversation/config/ (split from monolithic config)
#
# Optional extensions that augment the core workflow: skill injection,
# protocol loading, approval gates, dynamic speaker selection,
# mediated delegation, and topic type classification.
#
# All extensions default to disabled (or passive). Enable individually
# as needed — no behavioral change when off.
#
# Related files:
#   conversation/config/conversation.yml — core workflow config
#   conversation/config/personas.yml     — persona library, presets
#   conversation/config/quality.yml      — rubric, evaluator-optimizer
# ═══════════════════════════════════════════════════════════════

# ─── SKILL INJECTION ──────────────────────────────────────────
#
# Loadable skill modules injected into persona prompts by phase.
# Skills are canonical references extracted from Sprint 1 inline additions.
# The moderator injects the listed skills before dispatching each phase.
#
skill_injection:
  enabled: true
  source: ".mind/conversation/skills"
  rules:
    phase_2_opening:
      inject:
        - evidence-standards
        - reasoning-chains
        - decision-documentation
        - scope-discipline
    phase_3_cross_examination:
      inject:
        - challenge-methodology
        - evidence-standards
        - scope-discipline
    phase_4_rebuttal:
      inject:
        - reasoning-chains
        - evidence-standards
        - scope-discipline
    phase_5_5_gap_fill:
      inject:
        - evidence-standards
        - challenge-methodology

# ─── PROTOCOL LOADING ──────────────────────────────────────────
#
# Extracted protocol modules for the moderator. When enabled,
# the moderator reads standalone protocol files instead of inline
# instructions for large procedural sections.
#
protocol_loading:
  enabled: true
  source: ".mind/conversation/protocols"
  protocols:
    phase_routing:
      file: "phase-routing/PROTOCOL.md"
      gate: "phase_routing section exists"
    evaluator_optimizer:
      file: "evaluator-optimizer/PROTOCOL.md"
      gate: "evaluator_optimizer.enabled: true"
    approval_gates:
      file: "approval-gates/PROTOCOL.md"
      gate: "approval_gates.enabled: true"
    mediated_delegation:
      file: "mediated-delegation/PROTOCOL.md"
      gate: "delegation.enabled: true"

# ─── TOPIC TYPE CLASSIFICATION ─────────────────────────────────
#
# Optional topic classification that can influence persona selection
# and skill injection priorities. When auto_detect is true, the
# moderator infers the topic type from the user's input.
#
topic_type:
  type: ""              # e.g., "technology_choice", "architecture_design"
  auto_detect: true
  feature_priority: [user_advocate, strategist, economist]
  risk_assessment: [critic, researcher, pragmatist]

# ─── APPROVAL GATES ────────────────────────────────────────────
#
# Human-in-the-loop checkpoints at phase boundaries.
# When enabled, the moderator pauses and waits for user input.
# All gates default to disabled — no behavioral change when off.
#
approval_gates:
  enabled: false                    # Default: fully autonomous

  gates:
    after_opening_positions:
      phase: phase_2_opening
      prompt: "Review opening positions before proceeding to cross-examination"
      options:
        proceed:
          label: "Proceed to cross-examination"
          action: continue
        adjust_personas:
          label: "Adjust persona configuration"
          action: reconfigure
          requires_input: true
        inject_context:
          label: "Add context to the Topic Brief"
          action: update_topic_brief
          requires_input: true
        rerun:
          label: "Regenerate opening positions"
          action: rerun_phase
          allows_guidance: true
        abort:
          label: "Stop conversation"
          action: terminate
          termination_reason: "user_abort_after_positions"

    after_rebuttal:
      phase: phase_4_rebuttal
      prompt: "Review challenges and rebuttals before convergence synthesis"
      options:
        proceed:
          label: "Proceed to convergence"
          action: continue
        add_challenge:
          label: "Inject a specific challenge"
          action: inject_challenge
          requires_input: true
        skip_to_output:
          label: "Skip to output assembly"
          action: skip_to_phase
          target: phase_6_output
        another_round:
          label: "Run another round of debate"
          action: route_to_phase
          target: phase_3_cross_examination
        abort:
          label: "Stop conversation"
          action: terminate

    after_convergence:
      phase: phase_5_convergence
      prompt: "Review convergence analysis before final output assembly"
      options:
        finalize:
          label: "Assemble final output"
          action: continue
        gap_fill:
          label: "Run gap-fill optimization"
          action: route_to_phase
          target: phase_5_5_gap_fill
        rerun_convergence:
          label: "Re-run convergence synthesis"
          action: rerun_phase
          allows_guidance: true
        abort:
          label: "Stop conversation"
          action: terminate

# ─── DYNAMIC SPEAKER SELECTION ─────────────────────────────────
#
# Context-aware speaker ordering within phases.
# When enabled, the moderator selects the next speaker based on
# conversation context instead of using fixed rotation.
#
dynamic_selection:
  enabled: false                    # Default: fixed rotation

  applies_to:
    - phase_3_cross_examination
    - phase_4_rebuttal

  strategy: "most_relevant"         # most_relevant | least_heard | priority_weighted

  constraints:
    all_must_speak: true            # Every persona must speak once per phase
    max_consecutive: 1              # A persona can't speak twice in a row
    selection_history: true         # Log selection reasoning in state

# ─── MEDIATED DELEGATION ───────────────────────────────────────
#
# Agent-to-agent delegation requests routed through the moderator.
# Personas can request information from other personas; the moderator
# evaluates, routes, and injects responses.
#
delegation:
  enabled: false                    # Default: no delegation

  max_delegations_per_phase: 3      # Cap total delegations per phase
  max_delegations_per_persona: 1    # Cap delegations per persona per phase
  max_delegation_sub_agent_calls: 4 # Total sub-agent budget for all delegations

  approval: "auto"                  # auto | moderator_review

  validation:
    must_state_reason: true
    must_state_priority: true
    reject_if_answerable_from_context: true
    reject_cross_phase_context: true

  response_injection:
    target_phase: "next"            # Inject into requesting persona's next phase prompt
    format: |
      ### Delegation Response (from {responder_name})
      **Your question:** {original_question}
      **Response:** {response_content}
      **Note:** This was a mediated response — {responder_name} answered your
      specific question without seeing your full position.
