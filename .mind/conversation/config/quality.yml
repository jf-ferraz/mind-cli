# ═══════════════════════════════════════════════════════════════
# Conversation Analysis — Quality Configuration
# ═══════════════════════════════════════════════════════════════
# Runtime: Yes
# Part of: conversation/config/ (split from monolithic config)
#
# Quality rubric dimensions, thresholds, and the evaluator-optimizer
# loop that drives closed-loop quality refinement.
#
# Related files:
#   conversation/config/conversation.yml — core workflow config
#   conversation/config/personas.yml     — persona library, presets
#   conversation/config/extensions.yml   — skills, protocols, gates, delegation
# ═══════════════════════════════════════════════════════════════

# ─── QUALITY RUBRIC ───────────────────────────────────────────
quality_rubric:
  dimensions:
    perspective_diversity:
      weight: 1
      scale:
        1: "All positions agree from start"
        3: "Moderate tension, 1+ contrarian"
        5: "Genuine philosophical conflict on core question"
    evidence_quality:
      weight: 1
      scale:
        1: "Opinions only"
        3: "Mix of empirical + anecdotal"
        5: "Multiple independent empirical sources with replication"
    concession_depth:
      weight: 1
      scale:
        1: "Zero concessions"
        3: "Position adjustments on minor points"
        5: "At least 1 persona fundamentally revised their recommendation"
    challenge_substantiveness:
      weight: 1
      scale:
        1: "No challenges or superficial"
        3: "Challenges identify real weaknesses"
        5: "Challenges provide counter-evidence + alternative solutions"
    synthesis_quality:
      weight: 1
      scale:
        1: "Lists all positions"
        3: "Identifies consensus + disagreements"
        5: "Emergent insights not present in any single position"
    actionability:
      weight: 1
      scale:
        1: "Vague direction"
        3: "Clear recommendation"
        5: "Phased plan with falsifiability conditions"

  thresholds:
    re_run: 2.0        # Below this: re-run weakest phase
    usable: 3.5        # Below this: usable with caveats
    high_confidence: 3.6 # At or above: high-confidence output

# ─── EVALUATOR-OPTIMIZER LOOP ──────────────────────────────────
# Phase C (G4): Closed-loop quality refinement.
# After Phase 5 convergence, the moderator scores with the quality rubric.
# If below target, it triggers Phase 5.5 gap-fill targeting the weakest dimension,
# then re-evaluates. Repeats until target met, max iterations hit, or stall detected.
evaluator_optimizer:
  enabled: true
  max_iterations: 2               # Maximum optimization loops (Phase 5 → 5.5 → 5)
  target_score: 3.6               # Quality rubric threshold to exit loop successfully
  stall_threshold: 0.2            # Minimum quality improvement per iteration
  stall_patience: 2               # Consecutive stalled iterations before exit

  # Per-dimension minimum scores. If ANY dimension falls below its minimum,
  # trigger gap-fill targeting that dimension — even if overall score passes.
  # This prevents weak dimensions from hiding behind a passing average.
  dimension_minimums:
    concession_depth: 3           # Below 3 → mandatory gap-fill (re_run_aligned_pair)
    challenge_substantiveness: 3  # Below 3 → mandatory gap-fill (critic)
    evidence_quality: 3           # Below 3 → mandatory evidence audit + researcher gap-fill

  # Which dimensions to optimize, in priority order.
  # Only the top 2 weakest dimensions are addressed per iteration.
  optimization_priority:
    - perspective_diversity
    - concession_depth
    - evidence_quality
    - challenge_substantiveness
    - synthesis_quality
    - actionability

  # Per-dimension optimization config: strategy, persona limits, preferred persona
  dimension_limits:
    perspective_diversity:
      max_gap_fill_personas: 1
      preferred_persona: "critic"
    evidence_quality:
      max_gap_fill_personas: 1
      preferred_persona: "researcher"
    concession_depth:
      strategy: "re_run_aligned_pair"   # Re-run cross-exam for 2 most similar personas
      max_retries: 1
    challenge_substantiveness:
      max_gap_fill_personas: 1
      preferred_persona: "critic"
    synthesis_quality:
      strategy: "moderator_self_improve" # No sub-agent needed — moderator refines own output
    actionability:
      strategy: "moderator_self_improve"
