# ═══════════════════════════════════════════════════════════════
# Conversation Analysis — Core Configuration
# ═══════════════════════════════════════════════════════════════
# Runtime: Yes
# Part of: conversation/config/ (split from monolithic config)
#
# Core workflow configuration: parameters, phases, routing,
# context isolation rules, termination conditions, and moderation.
#
# Related files:
#   conversation/config/personas.yml    — persona library, presets, selection guide
#   conversation/config/quality.yml     — rubric, evaluator-optimizer
#   conversation/config/extensions.yml  — skills, protocols, gates, delegation
#
# The moderator reads all 4 files via readFile at startup.
# ═══════════════════════════════════════════════════════════════

# ─── CONVERSATION PARAMETERS ──────────────────────────────────
conversation:
  topic: ""                       # The subject of analysis (neutral, no leading language)
  objective: ""                   # What decision or understanding this should produce
  constraints: []                 # Non-negotiable requirements
  convergence_criteria: "weighted" # consensus | majority | weighted | unanimous

# ─── STATE MANAGEMENT ────────────────────────────────────────
# v2: Persistent session tracking — enables resume, conditional routing, quality loops
state:
  enabled: true
  path: ".github/state"
  auto_cleanup: false             # If true, delete state dir contents after Phase 6
  resume_on_restart: true         # Check for existing state on moderator start

# ─── SESSION ID NAMESPACING ──────────────────────────────────
# v3: Unique session IDs prevent state collisions across concurrent analyses
session_id:
  format: "{topic-slug}-{YYYY-MM-DD}-{platform}"  # platform: claude | copilot
  state_directory: ".github/state/{session-id}/"
  cleanup_policy: "manual"        # manual | auto_after_output | ttl
  ttl_days: 7                     # Only used when cleanup_policy: ttl

# ─── HISTORY PERSISTENCE ─────────────────────────────────────
# v3: Optionally persist full conversation history for audit and replay
history:
  persist_history: false           # Default off — enable for audit trails
  history_path: "docs/knowledge/history/{session-id}/"
  include:
    - phase_outputs                # Position papers, challenges, rebuttals
    - convergence                  # Final convergence analysis
    - quality_scores               # Per-dimension rubric scores
    - state_snapshots              # Phase boundary state files

# ─── PHASE CONFIGURATION ─────────────────────────────────────
phases:
  # Set `enabled: true/false` per phase, or use a variant preset below
  phase_2_opening:
    enabled: true
    parallel: true                # Run personas in parallel (recommended)
  phase_2_5_diversity_audit:
    enabled: true                 # Mandatory — catches duplicate positions and extracts tensions
    similarity_threshold: 0.70    # Pairwise textual overlap threshold
    evidence_overlap_threshold: 0.50
    tension_extraction: true      # Extract implicit cross-examination from overlapping evaluations
  phase_3_cross_examination:
    enabled: true
    challenge_depth: "evidence"   # assertion | evidence | formal
  phase_4_rebuttal:
    enabled: true
  phase_5_convergence:
    enabled: true
    quality_rubric: true          # Score with 6-dimension rubric
    falsifiability: true          # Require falsifiability conditions on each recommendation
    evidence_audit: true          # Audit all empirical claims before scoring Evidence Quality
    context_aware_criteria: true  # Derive decision matrix criteria from topic constraints, not generic
  phase_5_5_gap_fill:
    enabled: true
    trigger: "auto"               # auto (when Perspective Diversity < 3) | always | never
    # NOTE: When phase_routing is present, trigger is overridden to "conditional"
  phase_6_output:
    enabled: true
    output_path: "docs/knowledge/conversation-analysis-output-{{date}}.md"

# ─── CONTEXT ISOLATION RULES ─────────────────────────────────
# v2: Declarative rules controlling what each persona receives per phase.
# The moderator MUST consult these rules before constructing any sub-agent prompt.
#
# Context tokens:
#   topic_brief          — The user's original question/topic + any scoping parameters
#   persona_definition   — The persona's identity, priorities, and perspective from personas.yml
#   own_position         — This persona's Phase 2 position paper
#   other_positions      — All other personas' Phase 2 position papers (excludes own)
#   all_positions        — Every Phase 2 position paper (including own)
#   own_challenges       — Challenges this persona issued to others in Phase 3
#   other_challenges     — Challenges other personas issued (excludes challenges to this persona)
#   all_challenges       — Every Phase 3 challenge set
#   challenges_received  — Only the challenges directed AT this persona
#   own_rebuttal         — This persona's Phase 4 rebuttal
#   all_rebuttals        — Every Phase 4 rebuttal
#   tension_matrix       — The disagreement matrix from Phase 2.5 tension extraction
#   diversity_audit      — Phase 2.5 diversity audit results (similarity scores, effective count)
#   convergence_analysis — Phase 5 convergence synthesis output
#   gap_identification   — Gaps found during Phase 5 meta-analysis
#   all                  — Everything available (use sparingly — breaks isolation)
#
context_rules:
  phase_2_opening:
    receives: [topic_brief, persona_definition]
    blocked: [other_positions, all_challenges, all_rebuttals]
    rationale: "Independent position generation — no cross-contamination"

  phase_2_5_diversity_audit:
    actor: moderator
    receives: [all_positions]
    # Tension extraction is integrated into this phase.
    # After diversity audit, build tension matrix from overlapping/conflicting evaluations.

  phase_3_cross_examination:
    receives: [topic_brief, persona_definition, other_positions]
    blocked: [own_position, all_challenges, all_rebuttals]
    rationale: "Engage with foreign ideas, not defend own"

  phase_4_rebuttal:
    receives: [persona_definition, own_position, challenges_received]
    blocked: [other_positions, other_challenges, all_rebuttals]
    rationale: "Focused defense/concession on challenges to own position"

  phase_5_convergence:
    actor: moderator
    receives: [all]

  phase_5_5_gap_fill:
    receives: [topic_brief, persona_definition, convergence_analysis, gap_identification]
    blocked: [all_positions, all_challenges, all_rebuttals]
    rationale: "Fresh perspective — knows conclusions but not individual arguments"
    exceptions:
      concession_depth:
        additional_receives: [aligned_positions, aligned_challenges]
        rationale: "Must see the two most similar positions to challenge them"

# ─── PHASE ROUTING (v2 — directed graph) ──────────────────────
# When present, overrides the flat `phases` section.
# Each phase specifies its successor(s) with optional conditions.
# Conditions reference state variables from the conversation-state.yml file.
# The moderator evaluates conditions in order; first match wins.
phase_routing:

  phase_2_opening:
    enabled: true
    parallel: true
    next: phase_2_5_diversity_audit

  phase_2_5_diversity_audit:
    enabled: true
    similarity_threshold: 0.70
    evidence_overlap_threshold: 0.50
    tension_extraction: true
    next:
      default: phase_3_cross_examination
      conditions:
        - id: "insufficient_diversity"
          when: "effective_persona_count < min_personas"
          action: "inject_contrarian_persona"
          then: phase_2_opening
          max_retries: 1
        - id: "premature_consensus"
          when: "all_positions_agree == true"
          action: "inject_devil_advocate"
          then: phase_2_opening
          max_retries: 1

  phase_3_cross_examination:
    enabled: true
    challenge_depth: "evidence"       # assertion | evidence | formal
    next: phase_4_rebuttal

  phase_4_rebuttal:
    enabled: true
    next:
      default: phase_5_convergence
      conditions:
        - id: "zero_concessions"
          when: "concession_count == 0 AND round < max_rounds"
          action: "escalate_challenge_depth"
          then: phase_3_cross_examination
          side_effects:
            - set: challenge_depth
              to: "formal"
        - id: "critical_challenges_unresolved"
          when: "max_severity_challenge == 'MUST' AND round < max_rounds"
          action: "repeat_round"
          then: phase_3_cross_examination

  phase_5_convergence:
    enabled: true
    quality_rubric: true
    falsifiability: true
    evidence_audit: true
    context_aware_criteria: true
    next:
      default: phase_6_output
      conditions:
        - id: "quality_below_rerun"
          when: "quality_score < re_run_threshold"
          action: "abort_quality_failure"
          then: null
        - id: "quality_needs_improvement"
          when: "quality_score < high_confidence_threshold AND iteration < max_iterations"
          action: "trigger_gap_fill"
          then: phase_5_5_gap_fill

  phase_5_5_gap_fill:
    enabled: true
    trigger: "conditional"            # Triggered by routing, not config flag
    next: phase_5_convergence

  phase_6_output:
    enabled: true
    output_path: "docs/knowledge/conversation-analysis-output-{{date}}.md"
    next: null                        # Terminal node

# ─── TERMINATION CONDITIONS (v2) ──────────────────────────────
# Checked by the moderator BEFORE routing evaluation at every phase boundary.
# Termination takes priority over routing — if a termination condition fires,
# no routing conditions are evaluated.
termination:
  early_convergence:
    enabled: true
    check_after: [phase_2_5_diversity_audit]
    condition: "all_positions_agree == true AND effective_persona_count < min_personas"
    action: "skip_to_convergence"
    quality_flag: "premature_agreement"

  quality_abort:
    enabled: true
    check_after: [phase_5_convergence]
    conditions:
      - when: "quality_score < re_run_threshold"
        action: "abort"
      - when: "perspective_diversity_score == 1 AND concession_count == 0"
        action: "abort"

  token_budget:
    max_sub_agent_calls: 25           # Hard ceiling on total sub-agent invocations
    warning_at: 20                    # Log warning when this threshold is reached
    on_exceed: "graceful_degradation" # graceful_degradation | abort

  stall_detection:
    enabled: true
    trigger: "quality_improvement < 0.2 across 2 consecutive iterations"
    action: "break_loop"

# ─── MODERATION RULES ─────────────────────────────────────────
moderation:
  max_rounds: 2                   # How many cross-exam + rebuttal cycles (1 or 2)
  convergence_threshold: 0.70     # % agreement needed to declare consensus
  deadlock_protocol: "record"     # record | escalate | vote
  min_personas: 3                 # Minimum effective personas after Diversity Audit
  max_personas: 5                 # Beyond 5, moderator synthesis becomes unreliable
